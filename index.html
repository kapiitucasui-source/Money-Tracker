<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Money Tracker</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #471364;
      text-align: center;
    }
    h1 { color: #a041cf; }
    input, select, button {
      padding: 10px;
      margin: 5px;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    button {
      background: #de56f6;
      color: rgb(184, 38, 238);
      cursor: pointer;
      border: none;
    }
    button:hover { opacity: 0.9; }
    ul {
      list-style: none;
      padding: 0;
      max-width: 500px;
      margin: 0 auto;
    }
    li {
      background: #fff;
      margin: 5px 0;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      display: flex;
      justify-content: space-between;
    }
    .income { color: #3852b8; }
    .expense { color: #e87569; }
    #summary {
      margin-top: 20px;
      font-weight: bold;
    }
    .error-message {
      color: rgb(225, 42, 42);
      font-size: 0.9em;
      margin: 5px 0;
      display: none;
    }
  </style>
</head>
<body>
  <h1>Money Tracker</h1>
  <input id="desc" type="text" placeholder="Description" required>
  <input id="amount" type="number" step="0.01" placeholder="Amount" required>
  <select id="type">
    <option value="income">Income</option>
    <option value="expense">Expense</option>
  </select>
  <button onclick="addTransaction()">Add</button>
  <button onclick="resetAll()">Reset</button>

  <div class="error-message" id="error">Please enter a valid description and positive amount!</div>
  <ul id="transactions"></ul>
  <div id="summary">Income: ₱0.00 | Expense: ₱0.00 | Balance: ₱0.00</div>

  <script>
    let transactions = [];

    const formatCurrency = (num) => '₱${num.toFixed(2)}';

    function addTransaction() {
      const desc = document.getElementById('desc').value.trim();
      const amount = parseFloat(document.getElementById('amount').value);
      const type = document.getElementById('type').value;
      const errorEl = document.getElementById('error');

    
      if (!desc || isNaN(amount) || amount <= 0) {
        errorEl.style.display = 'block';
        setTimeout(() => errorEl.style.display = 'none', 3000);
        return;
      }

      transactions.push({
        desc,
        amount: Math.round(amount * 100) / 100,
        type
      });

      renderTransactions();
      saveData();
      document.getElementById('desc').value = '';
      document.getElementById('amount').value = '';
    }

    function resetAll() {
      if (confirm('Are you sure you want to delete all transactions?')) {
        transactions = [];
        renderTransactions();
        saveData();
      }
    }
    function renderTransactions() {
      const list = document.getElementById('transactions');
      list.innerHTML = '';
      let income = 0, expense = 0;

      transactions.forEach(t => {
        t.type === 'income' ? income += t.amount : expense += t.amount;
        
        const li = document.createElement('li');
        li.innerHTML = '${t.desc} - <span class="${t.type}">${formatCurrency(t.amount)}</span>';
        list.appendChild(li);
      });

      document.getElementById('summary').textContent = 
        'Income: ${formatCurrency(income)} | Expense: ${formatCurrency(expense)} | Balance: ${formatCurrency(income - expense)}';
    }

    function saveData() {
      try {
        localStorage.setItem('transactions', JSON.stringify(transactions));
      } catch (err) {
        console.error('Failed to save data:', err);
      }
    }

    window.onload = () => {
      try {
        const saved = localStorage.getItem('transactions');
        if (saved) transactions = JSON.parse(saved);
        renderTransactions();
      } catch (err) {
        console.error('Failed to load data:', err);
      }

      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('service-worker.js')
          .catch(err => console.error('Service worker registration failed:', err));
      }
    };
  </script>
</body>
</html>
